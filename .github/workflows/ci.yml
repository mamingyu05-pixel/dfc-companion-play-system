name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: mkdir -p apps/api-server/prisma && cp packages/database/prisma/schema.prisma apps/api-server/prisma/schema.prisma
      - run: pnpm --filter @dfc/api-server exec prisma generate --schema prisma/schema.prisma
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
