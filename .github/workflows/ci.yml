name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @dfc/api-server exec prisma generate --schema ../../packages/database/prisma/schema.prisma
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
