events {}

http {
  upstream api_server {
    server api-server:4000;
  }

  upstream customer_web {
    server customer-web:3000;
  }

  upstream companion_web {
    server companion-web:3001;
  }

  upstream admin_web {
    server admin-web:3002;
  }

  server {
    listen 80;
    server_name _;

    location = / {
      return 302 /customer/;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /customer/ {
      proxy_pass http://customer_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /customer {
      return 308 /customer/;
    }

    location /companion/ {
      proxy_pass http://companion_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /companion {
      return 308 /companion/;
    }

    location /admin/ {
      proxy_pass http://admin_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
      return 308 /admin/;
    }

    location /api/ {
      proxy_pass http://api_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
